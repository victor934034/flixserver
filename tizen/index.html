<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>FlixHome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1920px; height: 1080px;
        overflow: hidden;
        background: #0a0a0a;
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        color: #fff;
        -webkit-font-smoothing: antialiased;
      }
      #root { width: 1920px; height: 1080px; overflow: hidden; position: relative; }
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; }
      *:focus { outline: none; }
      @keyframes spin      { to { transform: rotate(360deg); } }
      @keyframes fadein    { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp   { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes glow      { 0%,100% { box-shadow: 0 0 20px rgba(255,255,255,.4),0 8px 32px rgba(0,0,0,.6); } 50% { box-shadow: 0 0 40px rgba(255,255,255,.7),0 8px 32px rgba(0,0,0,.6); } }
      @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 rgba(255,255,255,.35); } 100% { box-shadow: 0 0 0 16px rgba(255,255,255,0); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
